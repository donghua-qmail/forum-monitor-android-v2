name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如：1.0.0）'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Gradle 国内镜像
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle <<'EOF'
          allprojects {
              repositories {
                  def ALIYUN_REPOSITORY_URL = 'https://maven.aliyun.com/repository/public'
                  def ALIYUN_JCENTER_URL = 'https://maven.aliyun.com/repository/jcenter'
                  def ALIYUN_GOOGLE_URL = 'https://maven.aliyun.com/repository/google'
                  def ALIYUN_GRADLE_PLUGIN_URL = 'https://maven.aliyun.com/repository/gradle-plugin'

                  all { ArtifactRepository repo ->
                      if (repo instanceof MavenArtifactRepository) {
                          def url = repo.url.toString()
                          if (url.startsWith('https://repo1.maven.org/maven2/')) {
                              project.logger.lifecycle "Repository ${repo.url} replaced by $ALIYUN_REPOSITORY_URL."
                              remove repo
                          }
                          else if (url.startsWith('https://jcenter.bintray.com/')) {
                              project.logger.lifecycle "Repository ${repo.url} replaced by $ALIYUN_JCENTER_URL."
                              remove repo
                          }
                          else if (url.startsWith('https://dl.google.com/dl/android/maven2/')) {
                              project.logger.lifecycle "Repository ${repo.url} replaced by $ALIYUN_GOOGLE_URL."
                              remove repo
                          }
                          else if (url.startsWith('https://plugins.gradle.org/m2/')) {
                              project.logger.lifecycle "Repository ${repo.url} replaced by $ALIYUN_GRADLE_PLUGIN_URL."
                              remove repo
                          }
                      }
                  }
                  maven { url ALIYUN_REPOSITORY_URL }
                  maven { url ALIYUN_JCENTER_URL }
                  maven { url ALIYUN_GOOGLE_URL }
                  maven { url ALIYUN_GRADLE_PLUGIN_URL }
              }
          }
          EOF

      - name: 给 Gradle 添加执行权限
        run: chmod +x gradlew

      - name: 配置网络超时
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties
          echo "org.gradle.workers.max=2" >> ~/.gradle/gradle.properties

      - name: 清理缓存
        run: ./gradlew clean

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 编译 Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: forum-monitor-debug-${{ inputs.version }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: forum-monitor-release-${{ inputs.version }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: 获取 APK 信息
        run: |
          echo "Debug APK: app/build/outputs/apk/debug/app-debug.apk"
          ls -lh app/build/outputs/apk/debug/
          echo "Release APK: app/build/outputs/apk/release/app-release-unsigned.apk"
          ls -lh app/build/outputs/apk/release/
